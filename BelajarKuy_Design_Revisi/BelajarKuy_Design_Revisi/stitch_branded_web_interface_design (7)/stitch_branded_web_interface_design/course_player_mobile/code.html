<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BelajarKUY - Course Player Mobile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-container": "#2d2c28",
                    "surface-tint": "#844981",
                    "warning": "#E67E22",
                    "on-primary-fixed-variant": "#693168",

                    "background": "#fcf9f8",
                    "surface-container": "#f0eded",
                    "surface-dim": "#dcd9d9",
                    "on-error-container": "#93000a",
                    "tertiary-fixed-dim": "#c9c6c0",
                    "on-primary-fixed": "#370139",
                    "on-primary-container": "#be7db9",
                    "on-error": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed": "#ffd6f8",
                    "on-secondary": "#ffffff",
                    "tertiary": "#181814",
                    "secondary": "#855400",
                    "surface-container-highest": "#e5e2e1",
                    "on-secondary-container": "#6f4600",
                    "surface-bright": "#fcf9f8",
                    "on-tertiary": "#ffffff",
                    "on-primary": "#ffffff",
                    "primary-container": "#4a154b",
                    "on-background": "#1b1b1c",
                    "on-tertiary-fixed-variant": "#484742",
                    "surface-container-low": "#f6f3f2",
                    "surface": "#FFFFFF",
                    "background-subtle": "#F8F5F2",
                    "surface-container-high": "#eae7e7",
                    "on-tertiary-container": "#95938d",
                    "on-surface-variant": "#4f434c",
                    "on-surface": "#1b1b1c",

                    "surface-variant": "#e5e2e1",
                    "inverse-surface": "#303030",
                    "secondary-fixed": "#ffddb7",
                    "success": "#2D8A56",
                    "on-secondary-fixed": "#2a1700",
                    "secondary-fixed-dim": "#ffb95c",
                    "primary": "#300033",
                    "tertiary-fixed": "#e6e2db",
                    "error": "#D91E18",
                    "error-container": "#ffdad6",
                    "primary-fixed-dim": "#f6afef",
                    "inverse-on-surface": "#f3f0ef",
                    "inverse-primary": "#f6afef",
                    "secondary-container": "#ffb145",
                    "on-secondary-fixed-variant": "#653e00"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "4px",
                    "md": "16px",
                    "lg": "24px",
                    "margin-mobile": "16px",
                    "gutter": "24px",
                    "base": "4px",
                    "xxl": "64px",
                    "xl": "32px",
                    "margin-desktop": "48px",
                    "sm": "8px"
            },
            "fontFamily": {
                    "label-md": ["Plus Jakarta Sans"],
                    "body-lg": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "headline-lg-mobile": ["Plus Jakarta Sans"],
                    "display-lg": ["Plus Jakarta Sans"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "headline-lg": ["Plus Jakarta Sans"],
                    "caption": ["Plus Jakarta Sans"]

            "fontSize": {

                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],

                    "caption": ["12px", {"lineHeight": "16px", "fontWeight": "500"}]

          }
        }
      }

<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
          font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md text-body-md antialiased pb-24">
<!-- Focused Journey Header (Suppresses Global Nav) -->
<header class="sticky top-0 bg-surface z-50 px-margin-mobile py-sm flex items-center justify-between border-b border-surface-variant shadow-sm h-14">
<button class="text-on-surface hover:text-primary transition-colors flex items-center justify-center p-2 -ml-2 rounded-full hover:bg-surface-container">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex-1 px-4 truncate text-center">
<h1 class="font-label-md text-label-md font-bold text-on-surface truncate">Advanced UI/UX Fundamentals</h1>
</div>
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center p-2 -mr-2 rounded-full hover:bg-surface-container">
<span class="material-symbols-outlined">more_vert</span>
</button>
</header>
<!-- Video Player Area -->
<section class="relative w-full aspect-video bg-tertiary overflow-hidden flex flex-col justify-end group">
<!-- Video Thumbnail/Placeholder -->
<div class="absolute inset-0 w-full h-full">
<img alt="Course Video Thumbnail" class="w-full h-full object-cover opacity-80" data-alt="A high-quality cinematic still of a modern educational video course. The scene features a glowing digital interface overlaid on a bright, well-lit studio environment. The lighting is soft and professional, highlighting a sleek, modern aesthetic. The color palette emphasizes clean whites, deep purples, and subtle warm orange accents, reflecting an energetic and scholarly atmosphere." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBcsRHRBxitn2faEoacuInIX9e1Npb8YZO2rzkQFlm6brGJ_qtKqoTYS8_Bz_TpU-gif3J9xJ1Gwvo6HHeDQCL0FavMHaNgJVjYsfLmTKrQYHIWteqJ5Gvoh0GaTugt2OxQ-_fmOJ0AFsVISMhsu-JycB4-F4MZkDGWC94H8FwhPbTwGg_ropvEEktQfdv88oy-keCp8I24Uzm2YxwO1Vd37nYOxuv0Y4bOYniTGKLj5qvzUWeDkX40FHfEEFSUjRn_N9rxNJ4vbQ"/>
</div>
<!-- Center Play Button -->
<button class="absolute inset-0 m-auto w-16 h-16 bg-primary/90 text-on-primary rounded-full flex items-center justify-center shadow-lg transform transition-transform active:scale-95 z-10 backdrop-blur-sm border border-white/20">
<span class="material-symbols-outlined filled" style="font-size: 32px;">play_arrow</span>
</button>
<!-- Video Controls Scrim -->
<div class="absolute bottom-0 w-full bg-gradient-to-t from-black/80 to-transparent pt-12 pb-3 px-margin-mobile flex items-center gap-3 z-10 text-white">
<span class="font-caption text-caption">12:04</span>
<!-- Simple Video Progress Bar -->
<div class="flex-1 h-1.5 bg-white/30 rounded-full overflow-hidden">
<div class="h-full bg-warning w-[45%] rounded-full"></div>
</div>
<span class="font-caption text-caption">28:15</span>
<button class="text-white flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]">fullscreen</span>
</button>
</div>
</section>
<!-- Tabs Navigation -->
<nav class="flex border-b border-surface-variant px-margin-mobile bg-surface overflow-x-auto no-scrollbar shadow-sm relative z-20">
<button class="text-primary border-b-2 border-primary font-label-md text-label-md py-4 px-4 whitespace-nowrap transition-colors">
            Curriculum
        </button>
<button class="text-on-surface-variant hover:text-primary border-b-2 border-transparent font-label-md text-label-md py-4 px-4 whitespace-nowrap transition-colors">
            Description
        </button>
<button class="text-on-surface-variant hover:text-primary border-b-2 border-transparent font-label-md text-label-md py-4 px-4 whitespace-nowrap transition-colors">
            Resources
        </button>
</nav>
<!-- Content Area: Curriculum Accordion -->
<main class="px-margin-mobile py-lg bg-background flex flex-col gap-md">
<!-- Brand Progress Indicator -->
<div class="bg-surface rounded-xl p-md shadow-sm border border-surface-variant/50 flex flex-col gap-sm">
<div class="flex justify-between items-center">
<span class="font-label-md text-label-md text-on-surface-variant">Course Progress</span>
<span class="font-label-md text-label-md font-bold text-primary">45%</span>
</div>
<!-- Custom Gamified Progress Bar -->
<div class="h-2 bg-surface-container-high rounded-full relative mt-1">
<div class="absolute left-0 top-0 h-full rounded-full bg-gradient-to-r from-primary to-warning w-[45%]"></div>
<!-- Rocket Icon Head -->
<div class="absolute left-[45%] top-1/2 -translate-y-1/2 -ml-3 w-6 h-6 bg-surface rounded-full shadow border border-outline-variant flex items-center justify-center z-10 text-warning">
<span class="material-symbols-outlined text-[14px]">rocket</span>
</div>
</div>
</div>
<!-- Module Accordion 1 (Expanded) -->
<div class="bg-surface rounded-xl overflow-hidden shadow-[0_2px_8px_-2px_rgba(48,0,51,0.12)] border border-primary/10">
<button class="w-full px-md py-4 bg-surface-container-lowest flex items-start gap-3 text-left">
<div class="flex-1">
<h3 class="font-label-md text-label-md font-bold text-primary">Module 1: Design Systems Introduction</h3>
<p class="font-caption text-caption text-on-surface-variant mt-1">3 Lessons • 45 mins</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant">expand_less</span>
</button>
<div class="bg-surface border-t border-surface-variant/50">
<!-- Completed Lesson -->
<div class="flex items-start gap-sm p-md hover:bg-surface-container-low transition-colors cursor-pointer border-b border-surface-variant/30">
<span class="material-symbols-outlined filled text-success mt-0.5" style="font-size: 20px;">check_circle</span>
<div class="flex-1">
<p class="font-body-md text-body-md text-on-surface">1. What is a Design System?</p>
<span class="font-caption text-caption text-on-surface-variant">Video • 12:00</span>
</div>
</div>
<!-- Active Lesson -->
<div class="flex items-start gap-sm p-md bg-primary-container/10 border-l-4 border-primary transition-colors cursor-pointer border-b border-surface-variant/30">
<span class="material-symbols-outlined filled text-primary mt-0.5" style="font-size: 20px;">play_circle</span>
<div class="flex-1">
<p class="font-body-md text-body-md font-bold text-primary">2. Tokens &amp; Components Hierarchy</p>
<span class="font-caption text-caption text-primary/80">Video • 28:15 • Playing</span>
</div>
</div>
<!-- Locked/Next Lesson -->
<div class="flex items-start gap-sm p-md hover:bg-surface-container-low transition-colors cursor-pointer opacity-70">
<span class="material-symbols-outlined text-outline mt-0.5" style="font-size: 20px;">lock</span>
<div class="flex-1">
<p class="font-body-md text-body-md text-on-surface-variant">3. Documentation Best Practices</p>
<span class="font-caption text-caption text-on-surface-variant">Reading • 5 min read</span>
</div>
</div>
</div>
</div>
<!-- Module Accordion 2 (Collapsed) -->
<div class="bg-surface rounded-xl overflow-hidden shadow-sm border border-surface-variant">
<button class="w-full px-md py-4 bg-surface flex items-start gap-3 text-left">
<div class="flex-1">
<h3 class="font-label-md text-label-md font-bold text-on-surface">Module 2: Advanced Typography</h3>
<p class="font-caption text-caption text-on-surface-variant mt-1">4 Lessons • 1h 15 mins</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
</button>
</div>
<!-- Module Accordion 3 (Collapsed) -->
<div class="bg-surface rounded-xl overflow-hidden shadow-sm border border-surface-variant mb-md">
<button class="w-full px-md py-4 bg-surface flex items-start gap-3 text-left">
<div class="flex-1">
<h3 class="font-label-md text-label-md font-bold text-on-surface">Module 3: Prototyping &amp; Handoff</h3>
<p class="font-caption text-caption text-on-surface-variant mt-1">2 Lessons • 30 mins</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
</button>
</div>
</main>
<!-- Contextual Sticky Action Bottom Bar -->
<div class="fixed bottom-0 left-0 right-0 bg-surface px-margin-mobile py-sm border-t border-surface-variant shadow-[0_-4px_12px_-4px_rgba(48,0,51,0.1)] z-40 pb-6">
<button class="w-full bg-primary hover:bg-primary-container hover:text-on-primary-container text-on-primary font-label-md text-label-md py-3 px-4 rounded-lg flex justify-center items-center gap-2 transition-all active:scale-95">
<span class="material-symbols-outlined" style="font-size: 20px;">task_alt</span>
            Mark as Complete
        </button>
</div>
</body></html>
